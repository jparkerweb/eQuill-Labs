<!DOCTYPE html><html lang="en" data-theme="dark"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><script>
  try {
    var stored = localStorage.getItem('theme');
    var theme =
      stored === 'light' || stored === 'dark'
        ? stored
        : window.matchMedia('(prefers-color-scheme: light)').matches
          ? 'light'
          : 'dark';
    document.documentElement.dataset.theme = theme;
  } catch (_err) {
    document.documentElement.dataset.theme = 'dark';
  }
</script><title>eQuill Labs</title><link rel="icon" type="image/x-icon" href="/brand/favicon.ico"><link rel="stylesheet" href="/_astro/index.UiLoNUEW.css"></head> <body>  <h1>eQuill Labs</h1> <p>Under reconstruction.</p>  </body></html>
